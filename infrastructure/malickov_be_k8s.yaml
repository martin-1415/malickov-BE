apiVersion: apps/v1
kind: Deployment
metadata:
  name: malickov-be
  labels:
    app: malickov-be
spec:
  replicas: 1
  selector:
    matchLabels:
      app: malickov-be
  template:
    metadata:
      labels:
        app: malickov-be
    spec:
      containers:
        - name: malickov-be
          image: docker4asinkan/malickov-be:v1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: malickov-be
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30150