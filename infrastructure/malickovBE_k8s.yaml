apiVersion: apps/v1
kind: Deployment
metadata:
  name: malickov-be
spec:
  replicas: 1
  selector:
    matchLabels:
      app: malickov-be
  template:
    metadata:
      labels:
        app: malickov-be
    spec:
      # Makes localhost inside the pod = the host machine
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: malickov-be
          image: docker4asinkan/malickov-be:v1.0
          ports:
            - containerPort: 8080
          # No DB configuration needed here — Spring Boot loads its own properties
---
apiVersion: v1
kind: Service
metadata:
  name: malickov-be
spec:
  selector:
    app: malickov-be
  type: ClusterIP   # Required for NGINX Ingress, not exposed externally
  ports:
    - port: 8080
      targetPort: 8080