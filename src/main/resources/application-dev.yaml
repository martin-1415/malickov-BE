spring:
  application:
    name: backend
  liquibase:
    contexts: dev
    change-log: classpath:db/changelog/app-changelog.xml
  datasource:
    url: jdbc:postgresql://localhost:5432/malickov
    username: BEuser
    password: mypassword
security:
  JwtValidityMillis: 28800000


server:
  port: 8443
  ssl:
    key-store-type: PKCS12
    key-store: classpath:keystore-dev.p12
    key-store-password: veryStrongAndHiddenPassword
    key-alias: local-ssl

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true